<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crystal Clear - Admin Panel</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../CSS/style.css">
    <link rel="stylesheet" href="../CSS/admin.css">
</head>

<body>
    <div class="blob-bg"></div>

    <!-- Navigation -->
    <nav class="navbar glassmorphism">
        <div class="nav-brand">
            <i class="fa-solid fa-sparkles text-gradient"></i> Crystal <span>Clear</span>
        </div>
        <ul class="nav-links" id="nav-links">
            <!-- Dynamically populated based on auth state by common.js -->
        </ul>
        <div class="burger">
            <div class="line1"></div>
            <div class="line2"></div>
            <div class="line3"></div>
        </div>
    </nav>

    <!-- Main Content Area -->
    <main id="app-root">
        <section id="admin-view" class="view-section active">
            <h2 class="mb-4 text-gradient" style="font-size: 2.2rem; font-weight: 800;"><i
                    class="fa-solid fa-shield-halved"></i> Admin Control Panel</h2>

            <div class="glassmorphism mb-5"
                style="padding: 2rem; display: flex; justify-content: space-between; align-items: center; background: linear-gradient(to right, white, #f0fdf4);">
                <div>
                    <h3 style="font-size: 1.5rem; margin-bottom: 0.5rem; color: var(--primary-hover);">Appointment
                        Management</h3>
                    <p class="text-muted" style="margin: 0; font-size: 1.05rem;">Review, accept, or cancel incoming user
                        service requests.</p>
                </div>
                <div style="font-size: 3rem; color: var(--primary-light);">
                    <i class="fa-solid fa-calendar-check"></i>
                </div>
            </div>

            <div id="appointments-list" class="appointments-list">
                <!-- Javascript populated -->
            </div>

            <!-- Cancel Modal -->
            <div id="cancel-modal" class="glassmorphism"
                style="display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 2000; padding: 2.5rem; width: 90%; max-width: 450px;">
                <h3 class="mb-3 text-danger" style="font-size: 1.5rem; text-align: center;"><i
                        class="fa-solid fa-triangle-exclamation"></i> Cancel Appointment</h3>
                <p class="text-muted mb-4 text-center" style="font-size: 0.95rem;">Please provide a reason for
                    cancellation. This will be visible to the user.</p>
                <div class="form-group">
                    <textarea id="cancel-reason" class="form-control"
                        placeholder="E.g., Fully booked for this timeslot, out of service area..."
                        style="min-height: 100px;"></textarea>
                </div>
                <div style="display: flex; gap: 15px; margin-top: 1rem;">
                    <button id="submit-cancel" class="danger-btn" style="flex:1; padding: 0.8rem;">Confirm
                        Cancel</button>
                    <button
                        onclick="document.getElementById('cancel-modal').style.display='none'; document.getElementById('modal-overlay-admin').style.display='none'"
                        class="secondary-btn"
                        style="flex:1; padding: 0.8rem; border-color: var(--text-muted); color: var(--text-muted);">Abort</button>
                </div>
            </div>
            <!-- Modal Overlay -->
            <div id="modal-overlay-admin"
                style="display: none; position: fixed; top:0; left:0; width:100%; height:100%; z-index: 1500; background: rgba(31, 41, 55, 0.4); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);">
            </div>
        </section>
    </main>

    <!-- Notification Toast -->
    <div id="toast-container"></div>

    <script src="../JS/api.js"></script>
    <script src="../JS/common.js"></script>
    <script src="../JS/admin.js"></script>
</body>

</html>
