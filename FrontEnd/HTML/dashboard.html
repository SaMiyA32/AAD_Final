<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crystal Clear - Dashboard</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../CSS/style.css">
    <link rel="stylesheet" href="../CSS/dashboard.css">
</head>

<body>
    <div class="blob-bg">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <!-- Navigation -->
    <nav class="navbar glassmorphism">
        <div class="nav-brand">
            <i class="fa-solid fa-sparkles text-gradient"></i> Crystal <span>Clear</span>
        </div>
        <ul class="nav-links" id="nav-links">
            <!-- Dynamically populated based on auth state by common.js -->
        </ul>
        <div class="burger">
            <div class="line1"></div>
            <div class="line2"></div>
            <div class="line3"></div>
        </div>
    </nav>

    <!-- Main Content Area -->
    <main id="app-root">
        <section id="dashboard-view" class="view-section active">
            <h2 id="dashboard-title" class="mb-4" style="font-size: 2.2rem; font-weight: 700;"></h2>

            <div style="display: grid; grid-template-columns: 1fr; gap: 2rem;">
                <div>
                    <h3 class="mb-4 text-gradient" style="font-size: 1.5rem;">My Appointments</h3>
                    <div id="appointments-container"></div>
                </div>
            </div>

            <!-- Rating Modal -->
            <div id="rate-modal" class="glassmorphism"
                style="display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 2000; padding: 2.5rem; width: 90%; max-width: 450px;">
                <h3 class="mb-3" style="font-size: 1.5rem; text-align: center;">Rate Service</h3>
                <p id="rate-service-name" class="text-muted mb-4 text-center" style="font-weight: 500;"></p>
                <div class="form-group text-center mb-4 text-warning"
                    style="font-size: 2.5rem; cursor: pointer; display: flex; justify-content: center; gap: 10px;"
                    id="star-rating">
                    <i class="fa-solid fa-star" data-val="1"></i>
                    <i class="fa-solid fa-star" data-val="2"></i>
                    <i class="fa-solid fa-star" data-val="3"></i>
                    <i class="fa-solid fa-star" data-val="4"></i>
                    <i class="fa-solid fa-star" data-val="5"></i>
                </div>
                <div class="form-group">
                    <textarea id="rate-comment" class="form-control" placeholder="Write a short review..."
                        style="min-height: 100px;"></textarea>
                </div>
                <div style="display: flex; gap: 15px; margin-top: 1rem;">
                    <button id="submit-rate" class="primary-btn" style="flex:1; padding: 0.8rem;">Submit Review</button>
                    <button
                        onclick="document.getElementById('rate-modal').style.display='none'; document.getElementById('modal-overlay').style.display='none'"
                        class="secondary-btn" style="flex:1; padding: 0.8rem;">Cancel</button>
                </div>
            </div>
            <!-- Modal Overlay -->
            <div id="modal-overlay"
                style="display: none; position: fixed; top:0; left:0; width:100%; height:100%; z-index: 1500; background: rgba(31, 41, 55, 0.4); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);">
            </div>
        </section>
    </main>

    <!-- Notification Toast -->
    <div id="toast-container"></div>

    <script src="../JS/api.js"></script>
    <script src="../JS/common.js"></script>
    <script src="../JS/dashboard.js"></script>
</body>

</html>
