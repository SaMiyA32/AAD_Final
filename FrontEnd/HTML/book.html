<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crystal Clear - Book Service</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../CSS/style.css">
    <link rel="stylesheet" href="../CSS/book.css">
</head>

<body>
    <div class="blob-bg">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <!-- Navigation -->
    <nav class="navbar glassmorphism">
        <div class="nav-brand">
            <i class="fa-solid fa-sparkles text-gradient"></i> Crystal <span>Clear</span>
        </div>
        <ul class="nav-links" id="nav-links">
            <!-- Dynamically populated based on auth state by common.js -->
        </ul>
        <div class="burger">
            <div class="line1"></div>
            <div class="line2"></div>
            <div class="line3"></div>
        </div>
    </nav>

    <!-- Main Content Area -->
    <main id="app-root">
        <section id="book-content-container" class="view-section active">
        </section>
    </main>

    <!-- Notification Toast -->
    <div id="toast-container"></div>

    <script src="../JS/api.js"></script>
    <script src="../JS/common.js"></script>
    <script src="../JS/book.js"></script>
</body>

</html>
