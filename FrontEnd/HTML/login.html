<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crystal Clear - Login</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../CSS/style.css">
    <link rel="stylesheet" href="../CSS/login.css">
</head>

<body>
    <div class="blob-bg">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <!-- Navigation -->
    <nav class="navbar glassmorphism">
        <div class="nav-brand">
            <i class="fa-solid fa-sparkles text-gradient"></i> Crystal <span>Clear</span>
        </div>
        <ul class="nav-links" id="nav-links">
            <!-- Dynamically populated based on auth state by common.js -->
        </ul>
        <div class="burger">
            <div class="line1"></div>
            <div class="line2"></div>
            <div class="line3"></div>
        </div>
    </nav>

    <!-- Main Content Area -->
    <main id="app-root">
        <section id="login-view" class="view-section active" style="max-width: 500px; margin: 4rem auto;">
            <div class="glassmorphism" style="padding: 3.5rem 3rem; position: relative; overflow: hidden;">
                <!-- Decorative Accent -->
                <div
                    style="position: absolute; top: 0; left: 0; width: 100%; height: 6px; background: linear-gradient(90deg, var(--primary-light), var(--primary-color), var(--accent-color));">
                </div>

                <div style="text-align: center; margin-bottom: 2.5rem;">
                    <div
                        style="width: 60px; height: 60px; background: #ecfdf5; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 1rem auto; color: var(--primary-color); font-size: 1.5rem;">
                        <i class="fas fa-leaf"></i>
                    </div>
                    <h2 style="font-size: 2.2rem; font-weight: 800; color: var(--text-main); letter-spacing: -0.5px;">
                        Welcome Back</h2>
                    <p class="text-muted" style="margin-top: 0.5rem; font-size: 1.05rem;">Sign in to continue to Crystal
                        Clear.</p>
                </div>

                <form id="login-form">
                    <div class="form-group" style="margin-bottom: 1.8rem;">
                        <label style="font-weight: 600; color: #4b5563; font-size: 0.95rem;">Email Address</label>
                        <div style="position: relative;">
                            <span
                                style="position: absolute; left: 1rem; top: 50%; transform: translateY(-50%); color: var(--text-muted);"><i
                                    class="far fa-envelope"></i></span>
                            <input type="email" id="login-email" class="form-control" placeholder="name@example.com"
                                required style="padding-left: 2.8rem;">
                        </div>
                    </div>
                    <div class="form-group" style="margin-bottom: 2rem;">
                        <div style="display: flex; justify-content: space-between; align-items: center;">
                            <label
                                style="font-weight: 600; color: #4b5563; font-size: 0.95rem; margin-bottom: 0;">Password</label>
                            <a href="#" class="text-primary" style="font-size: 0.85rem; font-weight: 500;">Forgot
                                password?</a>
                        </div>
                        <div style="position: relative; margin-top: 0.5rem;">
                            <span
                                style="position: absolute; left: 1rem; top: 50%; transform: translateY(-50%); color: var(--text-muted);"><i
                                    class="fas fa-lock"></i></span>
                            <input type="password" id="login-password" class="form-control"
                                placeholder="Enter your password" required style="padding-left: 2.8rem;">
                        </div>
                    </div>
                    <button type="submit" class="primary-btn"
                        style="width: 100%; padding: 1rem; font-size: 1.1rem; letter-spacing: 0.5px; box-shadow: 0 10px 15px -3px rgba(16, 185, 129, 0.3);">Sign
                        In</button>
                </form>

                <div
                    style="margin-top: 2.5rem; text-align: center; border-top: 1px solid var(--border-color); padding-top: 1.5rem;">
                    <p class="text-muted" style="font-size: 0.95rem;">New to Crystal Clear? <a href="signup.html"
                            class="text-primary"
                            style="font-weight: 700; white-space: nowrap; margin-left: 0.3rem;">Create Account</a></p>
                </div>
            </div>
        </section>
    </main>

    <!-- Notification Toast -->
    <div id="toast-container"></div>

    <script src="../JS/api.js"></script>
    <script src="../JS/common.js"></script>
    <script src="../JS/login.js"></script>
</body>

</html>
